<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mukshoda Bhandar</title>

<style>
body {font-family: Arial; margin:0; background:#f1f3f6;}

header {
  background:#2874f0;
  color:white;
  padding:15px;
  text-align:center;
}

.container {padding:15px;}

.company-title {
  background:#fff;
  padding:10px;
  margin-top:15px;
  font-weight:bold;
  border-left:5px solid green;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  text-align:center;
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

button {
  background:#fb641b;
  color:white;
  border:none;
  padding:8px;
  margin-top:5px;
  width:100%;
  border-radius:5px;
}

#cart {
  background:white;
  padding:10px;
  margin:10px;
}
</style>
</head>

<body>

<header>
<h2>🌾 MUKSHODA BHANDAR</h2>
<p>Pesticide & Agro Shop</p>
</header>

<div class="container">

<!-- UPL -->
<div class="company-title">UPL</div>
<div class="grid">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Pesticide_spraying.jpg">
<h4>Saaf Fungicide</h4>
<p>₹350</p>
<button onclick="addToCart('Saaf Fungicide',350)">Add</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Agricultural_spraying.jpg">
<h4>Lancer Gold</h4>
<p>₹400</p>
<button onclick="addToCart('Lancer Gold',400)">Add</button>
</div>

</div>

<!-- Bayer -->
<div class="company-title">Bayer CropScience</div>
<div class="grid">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Farmer_spraying_pesticides.jpg">
<h4>Confidor</h4>
<p>₹450</p>
<button onclick="addToCart('Confidor',450)">Add</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Agriculture_field_spraying.jpg">
<h4>Regent GR</h4>
<p>₹500</p>
<button onclick="addToCart('Regent',500)">Add</button>
</div>

</div>

<!-- Syngenta -->
<div class="company-title">Syngenta</div>
<div class="grid">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Fertilizer_granules.jpg">
<h4>Actara</h4>
<p>₹420</p>
<button onclick="addToCart('Actara',420)">Add</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Seaweed.jpg">
<h4>Ampligo</h4>
<p>₹480</p>
<button onclick="addToCart('Ampligo',480)">Add</button>
</div>

</div>

<!-- Dhanuka -->
<div class="company-title">Dhanuka</div>
<div class="grid">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Pesticide_spraying.jpg">
<h4>Cover</h4>
<p>₹300</p>
<button onclick="addToCart('Cover',300)">Add</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Agricultural_spraying.jpg">
<h4>Delegate</h4>
<p>₹550</p>
<button onclick="addToCart('Delegate',550)">Add</button>
</div>

</div>

<h3>🧾 Cart</h3>
<div id="cart"></div>

<button onclick="checkout()">📲 WhatsApp Order</button>
<button onclick="payNow()">💳 Pay Now</button>

</div>

<script>
let cart = [];

function addToCart(name, price){
    cart.push({name, price});
    showCart();
}

function showCart(){
    let total = 0;
    let list = "";
    
    cart.forEach(item=>{
        total += item.price;
        list += item.name + " - ₹" + item.price + "<br>";
    });

    document.getElementById("cart").innerHTML = list + "<hr>Total: ₹" + total;
}

function checkout(){
    let msg = "Order:\n";
    cart.forEach(item=>{
        msg += item.name + "\n";
    });
    window.open("https://wa.me/919883558530?text=" + encodeURIComponent(msg));
}

function payNow(){
let upi = "upi://pay?pa=9883558530@ybl&pn=MukshodaBhandar&cu=INR";
window.open(upi);
}
</script>

</body>
</html>

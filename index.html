<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mukshoda Bhandar</title>

<style>
body {font-family: Arial; margin:0; background:#f1f3f6;}
header {background:#2874f0; color:white; padding:15px; text-align:center;}
.container {padding:15px;}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  text-align:center;
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

button {
  background:#fb641b;
  color:white;
  border:none;
  padding:8px;
  margin-top:5px;
  width:100%;
  border-radius:5px;
}

#cart {
  background:white;
  padding:10px;
  margin-top:10px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h2>🌾 MUKSHODA BHANDAR</h2>
<p>Pesticide & Agro Shop</p>
</header>

<div class="container">

<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">

<div class="grid" id="productList"></div>

<h3>🧾 Cart</h3>
<div id="cart"></div>

<button onclick="checkout()">📲 WhatsApp Order</button>
<button onclick="payNow()">💳 Pay Now</button>

</div>

<script>

let products = [

{company:"Smith N Smith", name:"Cameo", price:300, img:"https://via.placeholder.com/150"},
{company:"Smith N Smith", name:"Jwala", price:320, img:"https://via.placeholder.com/150"},
{company:"Smith N Smith", name:"Crocodile", price:350, img:"https://via.placeholder.com/150"},
{company:"Smith N Smith", name:"Dino Smith", price:360, img:"https://via.placeholder.com/150"},

{company:"Hindustan", name:"Hind Star", price:300, img:"https://via.placeholder.com/150"},
{company:"Hindustan", name:"Hind Shield", price:320, img:"https://via.placeholder.com/150"},
{company:"Hindustan", name:"Veer", price:340, img:"https://via.placeholder.com/150"},

{company:"Agro Life", name:"Sultan SP", price:400, img:"https://via.placeholder.com/150"},
{company:"Agro Life", name:"Prolife Gold", price:420, img:"https://via.placeholder.com/150"},
{company:"Agro Life", name:"Tanisi Gold", price:430, img:"https://via.placeholder.com/150"},
{company:"Agro Life", name:"Dizara", price:410, img:"https://via.placeholder.com/150"},
{company:"Agro Life", name:"Super Star", price:450, img:"https://via.placeholder.com/150"},

{company:"Mahindra", name:"Celdox", price:380, img:"https://via.placeholder.com/150"},
{company:"Mahindra", name:"M Star", price:360, img:"https://via.placeholder.com/150"},
{company:"Mahindra", name:"Tarar", price:340, img:"https://via.placeholder.com/150"},
{company:"Mahindra", name:"Mahamix", price:390, img:"https://via.placeholder.com/150"},
{company:"Mahindra", name:"Fussion", price:410, img:"https://via.placeholder.com/150"},

{company:"Karnataka", name:"Jivras", price:300, img:"https://via.placeholder.com/150"},
{company:"Karnataka", name:"Mahaphal", price:320, img:"https://via.placeholder.com/150"},
{company:"Karnataka", name:"Samras", price:330, img:"https://via.placeholder.com/150"},
{company:"Karnataka", name:"Kranti", price:350, img:"https://via.placeholder.com/150"}

];

let cart = [];

function loadProducts(list){

let html = "";

list.forEach(p=>{

html += `
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.company}</p>
<p>₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>
`;

});

document.getElementById("productList").innerHTML = html;

}

function searchProduct(){

let input = document.getElementById("search").value.toLowerCase();

let filtered = products.filter(p =>
p.name.toLowerCase().includes(input) ||
p.company.toLowerCase().includes(input)
);

loadProducts(filtered);

}

function addToCart(name, price){
cart.push({name, price});
showCart();
}

function showCart(){
let total = 0;
let list = "";

cart.forEach(item=>{
total += item.price;
list += item.name + " - ₹" + item.price + "<br>";
});

document.getElementById("cart").innerHTML = list + "<hr>Total: ₹" + total;
}

function checkout(){
let msg = "Order:\n";
cart.forEach(item=>{
msg += item.name + "\n";
});
window.open("https://wa.me/919883558530?text=" + encodeURIComponent(msg));
}

function payNow(){
let upi = "upi://pay?pa=9883558530@ybl&pn=MukshodaBhandar&cu=INR";
window.open(upi);
}

loadProducts(products);

</script>

</body>
</html>

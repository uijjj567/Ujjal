<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mukshoda Bhandar</title>

<style>
body { margin:0; font-family:Arial; }

/* LOGIN */
#loginBox { text-align:center; margin-top:100px; }

/* HEADER */
.header {
  background: teal;
  padding:10px;
  display:flex;
  color:white;
}
.search { flex:1; margin-left:10px; padding:5px; }

/* MENU */
.menu {
  position:fixed;
  left:-250px;
  top:0;
  width:250px;
  height:100%;
  background:#eee;
  padding:15px;
  transition:0.3s;
}

/* ADMIN */
.admin { background:#f2f2f2; padding:10px; }

/* PRODUCT */
.product {
  border-bottom:1px solid #ddd;
  padding:10px;
}
.product img { width:120px; }

/* BUTTON */
button {
  padding:8px;
  margin:3px;
  background:teal;
  color:white;
  border:none;
}

#main { display:none; }
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="user" placeholder="User ID"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- 🌐 MAIN -->
<div id="main">

<div class="header">
  <span onclick="openMenu()">☰</span>
  <input id="search" class="search" placeholder="Search..." onkeyup="searchProduct()">
</div>

<div id="menu" class="menu">
  <button onclick="closeMenu()">Close</button>
  <h3>Menu</h3>
  <p>Home</p>
</div>

<!-- ADMIN PANEL -->
<div class="admin">
  <h3>Admin Panel</h3>
  <input id="name" placeholder="Product Name">
  <input id="company" placeholder="Company">
  <input id="technical" placeholder="Technical Name">
  <input id="price" placeholder="Price">
  <input type="file" id="image">
  <button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<div id="products"></div>

<!-- CART -->
<h3 style="padding:10px;">🛒 Cart</h3>
<div id="cart"></div>
<button onclick="generatePDF()">📄 Generate PDF</button>

</div>

<script>

/* LOGIN */
let USER="admin", PASS="1234";
function login(){
  if(user.value==USER && pass.value==PASS){
    loginBox.style.display="none";
    main.style.display="block";
  } else alert("Wrong Login");
}

/* MENU */
function openMenu(){ menu.style.left="0"; }
function closeMenu(){ menu.style.left="-250px"; }

/* DATA */
let products=JSON.parse(localStorage.getItem("products"))||[];
let cart=[];

/* ADD PRODUCT */
function addProduct(){
  let reader=new FileReader();
  reader.onload=function(){
    products.push({
      name:name.value,
      company:company.value,
      technical:technical.value,
      price:price.value,
      image:reader.result
    });
    localStorage.setItem("products",JSON.stringify(products));
    showProducts();
  }
  reader.readAsDataURL(image.files[0]);
}

/* SHOW PRODUCT */
function showProducts(){
  let html="";
  products.forEach((p,i)=>{
    html+=`
    <div class="product">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>${p.technical}</p>
      <p>₹ ${p.price}</p>
      <button onclick="addCart(${i})">Add to Cart</button>
      <button onclick="del(${i})">Delete</button>
      <button onclick="whatsapp('${p.name}')">WhatsApp</button>
    </div>`;
  });
  productsDiv.innerHTML=html;
}
let productsDiv=document.getElementById("products");

/* DELETE */
function del(i){
  products.splice(i,1);
  localStorage.setItem("products",JSON.stringify(products));
  showProducts();
}

/* CART */
function addCart(i){
  cart.push(products[i]);
  showCart();
}
function showCart(){
  let html="";
  cart.forEach(p=>{
    html+=`<p>${p.name} - ₹${p.price}</p>`;
  });
  document.getElementById("cart").innerHTML=html;
}

/* SEARCH */
function searchProduct(){
  let val=search.value.toLowerCase();
  let html="";
  products.filter(p=>p.name.toLowerCase().includes(val))
  .forEach(p=>{
    html+=`<div class="product"><h3>${p.name}</h3></div>`;
  });
  productsDiv.innerHTML=html;
}

/* WHATSAPP */
function whatsapp(name){
  window.open("https://wa.me/919932186236?text=Order "+name);
}

/* PDF */
function generatePDF(){
  let text="Order List:\n";
  cart.forEach(p=>{
    text+=p.name+" - ₹"+p.price+"\n";
  });

  let blob=new Blob([text],{type:"text/plain"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="bill.txt";
  a.click();
}

showProducts();

</script>

</body>
</html>

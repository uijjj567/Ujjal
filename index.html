<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mukshoda Bhandar</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
.header{background:#00796b;color:#fff;padding:10px;text-align:center}

/* CARD */
.card{background:#fff;margin:10px;padding:10px;border-radius:10px}
button{padding:8px;border:none;color:#fff;margin:3px}
.call{background:#00796b}
.wa{background:#25D366}
.price{background:#ff9800}

/* ADMIN */
.admin{background:#fff;margin:10px;padding:10px;border-radius:10px}

/* DASHBOARD */
.dashboard{background:#fff;margin:10px;padding:10px;border-radius:10px}
</style>
</head>

<body>

<div class="header">
<h2>🌾 Mukshoda Bhandar</h2>
</div>

<!-- LOGIN -->
<div id="login">
<h3>Admin Login</h3>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<!-- DASHBOARD -->
<div class="dashboard">
<h3>📊 Dashboard</h3>
<p>Total Products: <b id="totalProducts">0</b></p>
<p>Total Views: <b id="totalViews">0</b></p>
</div>

<!-- ADMIN PANEL -->
<div class="admin">
<h3>Add Product</h3>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">
<input id="img" placeholder="Image URL">
<button onclick="addProduct()">➕ Add</button>
</div>

<!-- PRODUCTS -->
<div id="products"></div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

/* LOGIN */
function login(){
  if(user.value=="admin" && pass.value=="1234"){
    login.style.display="none";
    main.style.display="block";
    showProducts();
  }else{
    alert("Wrong Login");
  }
}

/* ADD PRODUCT */
function addProduct(){
  let p={
    name:name.value,
    price:price.value,
    stock:parseInt(stock.value),
    img:img.value,
    views:0
  };
  products.push(p);
  localStorage.setItem("products",JSON.stringify(products));
  showProducts();
}

/* SHOW */
function showProducts(){
  let html="";
  products.forEach((p,i)=>{

    html+=`
    <div class="card" onclick="viewProduct(${i})">
      <img src="${p.img}" width="100%">
      <h3>${p.name}</h3>
      <p>₹ ${p.price}</p>
      <p>Stock: ${p.stock}</p>

      <button class="call" onclick="call();event.stopPropagation()">📞</button>
      <button class="wa" onclick="wa('${p.name}');event.stopPropagation()">💬</button>
      <button class="price" onclick="buy(${i});event.stopPropagation()">Buy</button>
      <button onclick="del(${i});event.stopPropagation()">❌</button>
    </div>`;
  });

  productsDiv.innerHTML=html;

  // dashboard
  totalProducts.innerText=products.length;
  let v=0;
  products.forEach(p=>v+=p.views);
  totalViews.innerText=v;
}

/* VIEW */
function viewProduct(i){
  products[i].views++;
  localStorage.setItem("products",JSON.stringify(products));
  showProducts();
}

/* BUY */
function buy(i){
  if(products[i].stock>0){
    products[i].stock--;
    cart.push(products[i]);
    alert("Added to cart");
    showProducts();
  }else{
    alert("Out of stock");
  }
}

/* DELETE */
function del(i){
  products.splice(i,1);
  localStorage.setItem("products",JSON.stringify(products));
  showProducts();
}

/* CALL */
function call(){
  location.href="tel:9883558530";
}

/* WHATSAPP */
function wa(name){
  window.open("https://wa.me/919883558530?text=I want "+name);
}

/* BILL */
function bill(){
  let text="Mukshoda Bhandar\n\n";
  cart.forEach(p=>{
    text+=p.name+" - ₹"+p.price+"\n";
  });
  let blob=new Blob([text]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="bill.txt";
  a.click();
}

</script>

</body>
</html>

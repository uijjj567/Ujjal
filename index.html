<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mukshoda Bhandar</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f1f3f6;
}

header {
  background:#2874f0;
  color:white;
  padding:15px;
  text-align:center;
}

.container {
  padding:15px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  text-align:center;
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

button {
  background:#fb641b;
  color:white;
  border:none;
  padding:8px;
  margin-top:5px;
  width:100%;
  border-radius:5px;
}

#cart {
  background:white;
  padding:10px;
  margin:10px;
}

</style>
</head>

<body>

<header>
<h2>🌾 MUKSHODA BHANDAR</h2>
<p>Pesticide & Agro Shop</p>
</header>

<div class="container">

<h3>🛒 Products</h3>

<div class="grid">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Pesticide_spraying.jpg">
<h4>Cartap 50% SP</h4>
<p>₹300</p>
<button onclick="addToCart('Cartap',300)">Add to Cart</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Agricultural_spraying.jpg">
<h4>Chlorpyrifos</h4>
<p>₹280</p>
<button onclick="addToCart('Chlorpyrifos',280)">Add</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Farmer_spraying_pesticides.jpg">
<h4>Imidacloprid</h4>
<p>₹350</p>
<button onclick="addToCart('Imidacloprid',350)">Add</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Agriculture_field_spraying.jpg">
<h4>Emamectin</h4>
<p>₹400</p>
<button onclick="addToCart('Emamectin',400)">Add</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Fertilizer_granules.jpg">
<h4>Micronutrient</h4>
<p>₹250</p>
<button onclick="addToCart('Micronutrient',250)">Add</button>
</div>

</div>

<h3>🧾 Cart</h3>
<div id="cart"></div>

<button onclick="checkout()">📲 WhatsApp Order</button>
<button onclick="payNow()">💳 Pay Now</button>

</div>

<script>
let cart = [];

function addToCart(name, price){
    cart.push({name, price});
    showCart();
}

function showCart(){
    let total = 0;
    let list = "";
    
    cart.forEach(item=>{
        total += item.price;
        list += item.name + " - ₹" + item.price + "<br>";
    });

    document.getElementById("cart").innerHTML = list + "<hr>Total: ₹" + total;
}

function checkout(){
    let msg = "Order:\n";
    cart.forEach(item=>{
        msg += item.name + "\n";
    });
    window.open("https://wa.me/919883558530?text=" + encodeURIComponent(msg));
}

function payNow(){
let upi = "upi://pay?pa=9883558530@ybl&pn=MukshodaBhandar&cu=INR";
window.open(upi);
}
</script>

</body>
</html>

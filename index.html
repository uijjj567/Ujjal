<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mukshoda Bhandar - Complete System</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f9;}
header{background:#2874f0;color:white;padding:15px;text-align:center;}
header h3{margin:0;}
.container{padding:10px;margin-bottom:100px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:10px;}
.card{background:white;padding:10px;border-radius:10px;text-align:center;}
.card img{width:100%;height:100px;object-fit:cover;border-radius:5px;}
button{background:#fb641b;color:white;border:none;padding:6px;margin-top:5px;width:100%;border-radius:5px;cursor:pointer;}
input,select{width:100%;padding:5px;margin-top:5px;border-radius:5px;border:1px solid #ccc;}
#cartPopup{position:fixed;top:0;right:-100%;width:90%;max-width:350px;height:100%;background:white;box-shadow:-2px 0 5px rgba(0,0,0,0.3);padding:10px;transition:0.3s;overflow-y:auto;z-index:1000;}
#cartPopup.show{right:0;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;z-index:900;}
#overlay.show{display:block;}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.3);z-index:1001;display:none;width:90%;max-width:500px;max-height:90%;overflow-y:auto;}
.modal.show{display:block;}
.bottom{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:10px;box-shadow:0 -2px 5px rgba(0,0,0,0.1);}
.size-row{display:flex;gap:5px;margin-top:5px;}
.size-row input{flex:1;}
a.upi-link{display:block;text-align:center;margin-top:10px;padding:8px;background:green;color:white;text-decoration:none;border-radius:5px;}
</style>
</head>
<body>

<header>
<h3>🌾 Mukshoda Bhandar</h3>
<p>Prop. Khokan Bera & Sons</p>
<p>📍 Negua, Purba Medinipur, WB - 721448</p>
<p>📞 9932186236 / 9883558530</p>
</header>

<div class="container">
<button onclick="showLogin()">🔐 Admin Login</button>
<input type="text" id="search" placeholder="Search Products..." onkeyup="searchProduct()">
<div id="productList"></div>
</div>

<div id="overlay"></div>

<!-- Cart Popup -->
<div id="cartPopup">
<h3>🛒 কার্ট</h3>
<div id="cartItems"></div>
<hr>
<p id="cartTotal"></p>
<button onclick="closeCart()">Close</button>
<button onclick="generatePDF()">📄 Generate PDF</button>
<a id="upiPay" class="upi-link" target="_blank">💳 Pay via UPI</a>
<button onclick="checkoutWhatsApp()">📲 Checkout via WhatsApp</button>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal">
<h3>Admin Login</h3>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="modal">
<h3>Admin Panel</h3>
<label>Product Name:</label>
<input type="text" id="newName">
<label>Company:</label>
<input type="text" id="newCompany">
<label>Product Image (URL or Base64):</label>
<input type="text" id="newImgURL" placeholder="Paste image URL or base64 here">
<h4>Sizes & Price</h4>
<div id="sizeContainer"></div>
<button onclick="addSize()">+ Add Size</button>
<button onclick="addOrUpdateProduct()">Add / Update Product</button>
<hr>
<h4>Existing Products</h4>
<div id="adminProductList"></div>
<button onclick="closeAdmin()">Close</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// Data
let products = JSON.parse(localStorage.getItem("products")||JSON.stringify([
{company:"Smith",name:"Cameo",img:"https://via.placeholder.com/150",sizes:[{size:"1L",price:300},{size:"500ml",price:180}]}]));
let cart=[]; let editingIndex=-1;

// Load products
function loadProducts(list){
let html="";
list.forEach((p,index)=>{
html+=`<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.company}</p>
<select id="size_${index}" onchange="updatePrice(${index})">
${p.sizes.map(s=>`<option value="${s.price}">${s.size} - ₹${s.price}</option>`).join("")}
</select>
<p id="price_${index}">Price: ₹${p.sizes[0].price}</p>
<input type="number" id="qty_${index}" value="1" min="1">
<button onclick="addToCart(${index})">Add</button>
</div>`;
});
document.getElementById("productList").innerHTML=html;
}

function updatePrice(index){
let sel=document.getElementById("size_"+index);
document.getElementById("price_"+index).innerText="Price: ₹"+sel.value;
}

// Cart
function addToCart(index){
let p=products[index];
let sel=document.getElementById("size_"+index);
let size=sel.options[sel.selectedIndex].text.split(" - ")[0];
let price=parseInt(sel.value);
let qty=parseInt(document.getElementById("qty_"+index).value);
cart.push({name:p.name,company:p.company,size,price,qty});
showCart();
}
function showCart(){
if(cart.length==0){alert("Cart empty"); return;}
document.getElementById("overlay").classList.add("show");
document.getElementById("cartPopup").classList.add("show");
let html=""; let total=0;
cart.forEach((i,ind)=>{let sub=i.price*i.qty; total+=sub; html+=`${i.name} (${i.size}) x ${i.qty} = ₹${sub} <button onclick="removeItem(${ind})">❌</button><br>`;});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("cartTotal").innerText="Total: ₹"+total;
document.getElementById("upiPay").href="upi://pay?pa=9883558530@ybl&pn=MukshodaBhandar&am="+total+"&cu=INR";
}
function removeItem(i){cart.splice(i,1);showCart();}
function closeCart(){document.getElementById("cartPopup").classList.remove("show");document.getElementById("overlay").classList.remove("show");}

// Search
function searchProduct(){
let v=document.getElementById("search").value.toLowerCase();
loadProducts(products.filter(p=>p.name.toLowerCase().includes(v)||p.company.toLowerCase().includes(v)));
}

// Admin login
function showLogin(){document.getElementById("loginModal").classList.add("show");document.getElementById("overlay").classList.add("show");}
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;
if(u=="ujjalbera9351@gmail.com" && p=="Ujjal@2000"){
alert("Login Successful");
document.getElementById("loginModal").classList.remove("show");
document.getElementById("overlay").classList.remove("show");
document.getElementById("adminPanel").classList.add("show");
loadAdminProducts();
}else{alert("Wrong Credentials");}
}
function closeAdmin(){document.getElementById("adminPanel").classList.remove("show");document.getElementById("overlay").classList.remove("show");}

// Admin functions
function addSize(){
let div=document.createElement("div"); div.className="size-row";
div.innerHTML='<input placeholder="Size (e.g. 1L)"><input placeholder="Price" type="number"><button onclick="this.parentNode.remove()">❌</button>';
document.getElementById("sizeContainer").appendChild(div);
}
function addOrUpdateProduct(){
let name=document.getElementById("newName").value;
let company=document.getElementById("newCompany").value;
let img=document.getElementById("newImgURL").value||"https://via.placeholder.com/150";
let sizes=[];
document.querySelectorAll("#sizeContainer .size-row").forEach(r=>{
let s=r.children[0].value; let p=parseInt(r.children[1].value);
if(s && !isNaN(p)) sizes.push({size:s,price:p});
});
if(!name||!company||sizes.length==0){alert("সব ফিল্ড পূরণ করুন!"); return;}
if(editingIndex>=0){products[editingIndex]={name,company,img,sizes}; editingIndex=-1; alert("Updated!");}
else{products.push({name,company,img,sizes}); alert("Added!");}
localStorage.setItem("products",JSON.stringify(products));
loadProducts(products); loadAdminProducts();
document.getElementById("newName").value=""; document.getElementById("newCompany").value="";
document.getElementById("sizeContainer").innerHTML=""; document.getElementById("newImgURL").value="";
}
function loadAdminProducts(){
let html=""; products.forEach((p,i)=>{ html+=`${p.name} (${p.company}) <button onclick="editProduct(${i})">Edit</button> <button onclick="deleteProduct(${i})">Delete</button><br>`; });
document.getElementById("adminProductList").innerHTML=html;
}
function editProduct(i){
let p=products[i]; editingIndex=i;
document.getElementById("newName").value=p.name;
document.getElementById("newCompany").value=p.company;
document.getElementById("newImgURL").value=p.img;
document.getElementById("sizeContainer").innerHTML="";
p.sizes.forEach(s=>{let div=document.createElement("div"); div.className="size-row";
div.innerHTML=`<input value="${s.size}"><input type="number" value="${s.price}"><button onclick="this.parentNode.remove()">❌</button>`;
document.getElementById("sizeContainer").appendChild(div);
});
}
function deleteProduct(i){if(confirm("Are you sure?")){products.splice(i,1); localStorage.setItem("products",JSON.stringify(products)); loadProducts(products); loadAdminProducts();}}

// PDF
function generatePDF(){
if(cart.length==0){alert("Cart empty"); return;}
const {jsPDF}=window.jspdf;
let doc=new jsPDF(),y=10,total=0;
doc.text("Mukshoda Bhandar",10,y); y+=10;
doc.text("Prop. Khokan Bera & Sons",10,y); y+=10;
doc.text("Negua, Purba Medinipur",10,y); y+=10;
doc.text("Mob: 9932186236",10,y); y+=10;
cart.forEach(i=>{let s=i.price*i.qty; total+=s; doc.text(`${i.name} ${i.size} x${i.qty} = ₹${s}`,10,y); y+=10;});
doc.text("Total: ₹"+total,10,y+10);
doc.save("bill.pdf");
}

// WhatsApp
function checkoutWhatsApp(){
if(cart.length==0){alert("Cart empty"); return;}
let msg="Order from Mukshoda Bhandar\n"; cart.forEach(i=>msg+=`${i.name} ${i.size} x${i.qty}\n`);
window.open("https://wa.me/919883558530?text="+encodeURIComponent(msg));
}

// Initial load
loadProducts(products);
</script>

<div class="bottom">
<button onclick="loadProducts(products)">🏠 Home</button>
<button onclick="showCart()">🛒 Cart</button>
</div>

</body>
</html>

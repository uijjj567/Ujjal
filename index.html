<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agro Shop Admin</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

/* Navbar */
.navbar {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

/* Admin Panel */
.admin {
  padding: 20px;
  background: #1e293b;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  background: #22c55e;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

/* Product Grid */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

/* Card */
.card {
  background: #1e293b;
  width: 250px;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

.card img {
  width: 100%;
}

.price {
  color: #22c55e;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="navbar">🌱 Agro Shop (Admin Panel)</div>

<!-- Admin Panel -->
<div class="admin">
  <h3>Add Product</h3>
  
  <input type="text" id="name" placeholder="Product Name">
  <input type="text" id="price" placeholder="Price">
  <input type="text" id="image" placeholder="Image URL">
  
  <button onclick="addProduct()">Add Product</button>
</div>

<!-- Product List -->
<div class="container" id="products"></div>

<script>

// Load saved products
let products = JSON.parse(localStorage.getItem("products")) || [];

// Display
function showProducts() {
  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p, index) => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h4>${p.name}</h4>
        <div class="price">${p.price}</div>

        <button onclick="order('${p.name}')">Order</button>
        <button onclick="deleteProduct(${index})" style="background:red">Delete</button>
      </div>
    `;
  });
}

// Add Product
function addProduct() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let image = document.getElementById("image").value;

  if(name && price && image){
    products.push({name, price, image});
    localStorage.setItem("products", JSON.stringify(products));
    showProducts();
  }
}

// Delete
function deleteProduct(index) {
  products.splice(index,1);
  localStorage.setItem("products", JSON.stringify(products));
  showProducts();
}

// WhatsApp Order
function order(name) {
  let url = "https://wa.me/919883558530?text=" + encodeURIComponent("Order: " + name);
  window.open(url);
}

showProducts();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mukshoda Bhandar</title>

<style>
body { margin:0; font-family:Arial; }

/* LOGIN */
#loginBox { text-align:center; margin-top:100px; }

/* HEADER */
.header {
  background:#00796b;
  color:white;
  padding:10px;
  display:flex;
}
.search { flex:1; margin-left:10px; padding:5px; }

/* PRODUCT */
.card {
  border-bottom:1px solid #ddd;
  padding:10px;
}
.card img { width:100%; max-height:200px; object-fit:contain; }

/* BUTTON */
button {
  padding:8px;
  margin:3px;
  border:none;
  color:white;
}
.call { background:#009688; }
.whatsapp { background:#25D366; }
.price { background:#ff9800; }

/* ADMIN */
.admin { background:#f2f2f2; padding:10px; }

#main { display:none; }
</style>

<script type="module">

// 🔥 Firebase import
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

// 🔑 তোমার Firebase config বসাও
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// 🔐 LOGIN
window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth,email.value,pass.value);
    loginBox.style.display="none";
    main.style.display="block";
    loadProducts();
  }catch{
    alert("Login Failed");
  }
}

// ➕ ADD PRODUCT
window.addProduct = async function(){
  let files = image.files;
  let urls = [];

  for(let file of files){
    let refStorage = ref(storage,"products/"+file.name);
    await uploadBytes(refStorage,file);
    let url = await getDownloadURL(refStorage);
    urls.push(url);
  }

  await addDoc(collection(db,"products"),{
    name:name.value,
    company:company.value,
    technical:technical.value,
    category:category.value,
    price:price.value,
    location:location.value,
    images:urls
  });

  alert("Added!");
  loadProducts();
}

// 📦 LOAD PRODUCTS
async function loadProducts(){
  let snap = await getDocs(collection(db,"products"));
  let html="";

  snap.forEach(docu=>{
    let p = docu.data();

    html+=`
    <div class="card">
      <img src="${p.images[0]}">
      <h3>${p.name}</h3>
      <p>${p.technical}</p>
      <p>₹ ${p.price}/litre</p>
      <p>${p.company}</p>
      <p>${p.location}</p>

      <button class="call" onclick="call()">📞 Call</button>
      <button class="whatsapp" onclick="whatsapp('${p.name}')">💬 WhatsApp</button>
      <button class="price" onclick="bestPrice('${p.name}')">💰 Best Price</button>
      <button onclick="shareProduct('${p.name}')">🔗 Share</button>
      <button onclick="deleteProduct('${docu.id}')">❌ Delete</button>
    </div>`;
  });

  products.innerHTML=html;
}

// ❌ DELETE
window.deleteProduct = async function(id){
  await deleteDoc(doc(db,"products",id));
  loadProducts();
}

// 🔍 SEARCH
window.searchProduct = async function(){
  let val = search.value.toLowerCase();
  let snap = await getDocs(collection(db,"products"));
  let html="";

  snap.forEach(docu=>{
    let p = docu.data();
    if(p.name.toLowerCase().includes(val) || p.category.toLowerCase().includes(val)){
      html+=`<div class="card"><h3>${p.name}</h3></div>`;
    }
  });

  products.innerHTML=html;
}

// 📞 CALL
window.call = ()=> window.location.href="tel:9932186236";

// 💬 WHATSAPP
window.whatsapp = (name)=> window.open("https://wa.me/919932186236?text=I want "+name);

// 💰 BEST PRICE
window.bestPrice = (name)=> window.open("https://wa.me/919932186236?text=Best price for "+name);

// 🔗 SHARE
window.shareProduct = (name)=>{
  navigator.share({
    title:name,
    text:"Check this product",
    url:window.location.href
  });
}

</script>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main">

<div class="header">
  ☰
  <input id="search" class="search" placeholder="Search..." onkeyup="searchProduct()">
</div>

<!-- ADMIN -->
<div class="admin">
  <h3>Admin Panel</h3>
  <input id="name" placeholder="Product Name">
  <input id="company" placeholder="Company">
  <input id="technical" placeholder="Technical Name">
  <input id="category" placeholder="Category">
  <input id="price" placeholder="Price">
  <input id="location" placeholder="Location">
  <input type="file" id="image" multiple>
  <button onclick="addProduct()">➕ Add Product</button>
</div>

<!-- PRODUCTS -->
<div id="products"></div>

</div>

</body>
</html>

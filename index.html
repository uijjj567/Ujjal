<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mukshoda Bhandar</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
.header{background:#00796b;color:#fff;padding:10px;text-align:center}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px}
button{padding:6px;border:none;color:#fff;margin:3px}
.wa{background:#25D366}
.call{background:#00796b}
.price{background:#ff9800}
.edit{background:#3f51b5}
.del{background:red}
.admin,.dashboard{background:#fff;margin:10px;padding:10px;border-radius:10px}
input,textarea{width:100%;margin:4px 0;padding:6px}
</style>
</head>

<body>

<div class="header"><h2>🌾 Mukshoda Bhandar</h2></div>

<!-- DASHBOARD -->
<div class="dashboard">
<h3>📊 Dashboard</h3>
<p>Total Products: <b id="totalProducts">0</b></p>
<p>Total Sales: ₹ <b id="totalSales">0</b></p>
<p>Total Orders: <b id="totalOrders">0</b></p>

<h3>📈 Sales Graph</h3>
<canvas id="salesChart"></canvas>
</div>

<!-- ADMIN -->
<div class="admin">
<h3>Add / Edit Product</h3>

<input id="name" placeholder="Name">
<input id="technical" placeholder="Technical">
<input id="category" placeholder="Category">
<input id="price" placeholder="Price">
<input id="tax" placeholder="GST % (5/12/18)">
<input id="stock" placeholder="Stock">

<textarea id="description" placeholder="Description"></textarea>

<input id="location" placeholder="Location">
<input type="file" id="image">

<button onclick="addProduct()">Save</button>
</div>

<div id="products"></div>

<!-- DETAIL -->
<div id="detailPage" style="display:none;padding:10px;background:#fff">
<button onclick="back()">⬅ Back</button>

<h2 id="d_name"></h2>
<p id="d_price"></p>
<img id="d_img" width="100%">

<p id="d_description"></p>

<div style="position:fixed;bottom:0;width:100%;display:flex;">
<button class="call" onclick="call()">📞</button>
<button class="wa" onclick="wa()">💬</button>
<button class="price" onclick="payUPI()">💳</button>
<button onclick="generatePDF()">🧾</button>
<button onclick="printBill()">🖨️</button>
</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let editIndex=-1;
let currentProduct={};

/* ADD / UPDATE */
function addProduct(){

  let reader=new FileReader();

  reader.onload=function(){

    let p={
      name:name.value,
      price:parseFloat(price.value),
      tax:parseFloat(tax.value)||18,
      stock:parseInt(stock.value),
      description:description.value,
      location:location.value,
      img:reader.result
    };

    if(editIndex==-1) products.push(p);
    else {products[editIndex]=p; editIndex=-1;}

    localStorage.setItem("products",JSON.stringify(products));
    showProducts();
    clearForm();
  }

  if(image.files[0]) reader.readAsDataURL(image.files[0]);
  else reader.onload();
}

/* SHOW */
function showProducts(){
  let html="";
  products.forEach((p,i)=>{

    let stockText = p.stock<=5 
    ? "<span style='color:red'>Low Stock</span>" 
    : p.stock;

    html+=`
    <div class="card">
    <img src="${p.img}" width="100%">
    <h3>${p.name}</h3>
    <p>₹${p.price}</p>
    <p>Stock: ${stockText}</p>

    <button class="edit" onclick="editProduct(${i})">✏️</button>
    <button class="del" onclick="del(${i})">❌</button>
    <button onclick="viewProduct(${i})">👁️</button>
    <button onclick="buy(${i})">Buy</button>
    </div>`;
  });

  productsDiv.innerHTML=html;
  totalProducts.innerText=products.length;
  loadSales();
  loadChart();
}

/* BUY */
function buy(i){
  let p=products[i];

  if(p.stock>0){
    p.stock--;

    sales.push({
      price:p.price,
      date:new Date().toLocaleDateString()
    });

    localStorage.setItem("sales",JSON.stringify(sales));
    localStorage.setItem("products",JSON.stringify(products));

    alert("Order placed");
    showProducts();
  }else alert("Out of stock");
}

/* SALES */
function loadSales(){
  let total=0;
  sales.forEach(s=>total+=s.price);
  totalSales.innerText=total;
  totalOrders.innerText=sales.length;
}

/* GRAPH */
function loadChart(){

  let map={};

  sales.forEach(s=>{
    map[s.date]=(map[s.date]||0)+s.price;
  });

  let ctx=document.getElementById("salesChart");

  new Chart(ctx,{
    type:"bar",
    data:{
      labels:Object.keys(map),
      datasets:[{label:"Sales ₹",data:Object.values(map)}]
    }
  });
}

/* VIEW */
function viewProduct(i){
  let p=products[i];
  currentProduct=p;

  d_name.innerText=p.name;
  d_price.innerText="₹"+p.price;
  d_img.src=p.img;
  d_description.innerText=p.description;

  productsDiv.style.display="none";
  detailPage.style.display="block";
}

/* BACK */
function back(){
  detailPage.style.display="none";
  productsDiv.style.display="block";
}

/* EDIT */
function editProduct(i){
  let p=products[i];
  name.value=p.name;
  price.value=p.price;
  tax.value=p.tax;
  stock.value=p.stock;
  description.value=p.description;
  location.value=p.location;
  editIndex=i;
}

/* DELETE */
function del(i){
  if(confirm("Delete?")){
    products.splice(i,1);
    localStorage.setItem("products",JSON.stringify(products));
    showProducts();
  }
}

/* CALL */
function call(){
  location.href="tel:9883558530";
}

/* WHATSAPP */
function wa(){
  window.open("https://wa.me/919883558530?text=I want "+currentProduct.name);
}

/* UPI */
function payUPI(){
  window.location.href="upi://pay?pa=9883558530@ybl&pn=Mukshoda&am="+currentProduct.price;
}

/* PDF */
function generatePDF(){

  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();

  let p=currentProduct;
  let gst=p.price*p.tax/100;
  let total=p.price+gst;

  doc.text("MUKSHODA BHANDAR",20,20);
  doc.text("Product: "+p.name,20,40);
  doc.text("Price: ₹"+p.price,20,50);
  doc.text("GST: ₹"+gst.toFixed(2),20,60);
  doc.text("Total: ₹"+total.toFixed(2),20,70);

  doc.save("bill.pdf");
}

/* PRINT */
function printBill(){

  let p=currentProduct;
  let gst=p.price*p.tax/100;
  let total=p.price+gst;

  let html=`
  <h2>MUKSHODA BHANDAR</h2>
  <p>${p.name}</p>
  <p>₹${p.price}</p>
  <p>GST: ₹${gst}</p>
  <p>Total: ₹${total}</p>
  `;

  let w=window.open();
  w.document.write(html);
  w.print();
}

/* CLEAR */
function clearForm(){
  document.querySelectorAll("input,textarea").forEach(i=>i.value="");
}

showProducts();

</script>

</body>
</html>

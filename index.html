<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

/* HEADER */
.header {
  position:sticky;
  top:0;
  background:#00796b;
  padding:10px;
  display:flex;
  align-items:center;
  color:white;
  z-index:1000;
}
.menu-btn { font-size:22px; cursor:pointer; }
.search {
  flex:1;
  margin-left:10px;
  padding:8px;
  border-radius:5px;
  border:none;
}

/* DRAWER */
.drawer {
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:white;
  box-shadow:2px 0 5px rgba(0,0,0,0.3);
  transition:0.3s;
  padding:15px;
}

/* PRODUCT CARD */
.card {
  background:white;
  margin:10px;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:200px;
  object-fit:contain;
  background:#fff;
}

/* CONTENT */
.content { padding:10px; }

.title {
  font-size:16px;
  font-weight:bold;
}

.price {
  color:#e65100;
  font-size:18px;
  margin:5px 0;
}

.info {
  font-size:13px;
  color:#666;
}

/* BUTTONS */
.actions {
  display:flex;
  border-top:1px solid #eee;
}

.actions button {
  flex:1;
  padding:10px;
  border:none;
  font-size:13px;
}

.call { background:#009688; color:white; }
.whatsapp { background:#25D366; color:white; }
.pricebtn { background:#ff9800; color:white; }

/* ADMIN */
.admin {
  background:#ffffff;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
input {
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>

<!-- HEADER -->
<div class="header">
  <span class="menu-btn" onclick="menuOpen()">☰</span>
  <input id="search" class="search" placeholder="Search Products..." onkeyup="searchProduct()">
</div>

<!-- DRAWER -->
<div id="drawer" class="drawer">
  <h3>Menu</h3>
  <p>🏠 Home</p>
  <p>📦 Products</p>
  <p onclick="menuClose()">❌ Close</p>
</div>

<!-- ADMIN -->
<div class="admin">
  <h3>Add Product</h3>
  <input id="name" placeholder="Product Name">
  <input id="company" placeholder="Company">
  <input id="technical" placeholder="Technical Name">
  <input id="category" placeholder="Category">
  <input id="price" placeholder="Price">
  <input id="location" placeholder="Location">
  <input type="file" id="image" multiple>
  <button onclick="addProduct()">➕ Add</button>
</div>

<!-- PRODUCTS -->
<div id="products"></div>

<script>

/* MENU */
function menuOpen(){ drawer.style.left="0"; }
function menuClose(){ drawer.style.left="-260px"; }

/* SHOW PRODUCTS */
function showProducts(data){
  let html="";
  data.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.images[0]}">
      <div class="content">
        <div class="title">${p.name}</div>
        <div class="info">${p.technical}</div>
        <div class="price">₹ ${p.price}/litre</div>
        <div class="info">${p.company} • ${p.location}</div>
      </div>

      <div class="actions">
        <button class="call" onclick="call()">📞 Call</button>
        <button class="whatsapp" onclick="whatsapp('${p.name}')">💬 WhatsApp</button>
        <button class="pricebtn" onclick="bestPrice('${p.name}')">💰 Price</button>
      </div>
    </div>`;
  });

  document.getElementById("products").innerHTML=html;
}

</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mukshoda Bhandar</title>

<style>
body{font-family:Arial;margin:0;background:#f1f3f6;}
header{background:#2874f0;color:white;padding:10px;text-align:center;}
.container{padding:10px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.card{background:white;padding:10px;border-radius:10px;text-align:center;}
.card img{width:100%;height:100px;}
button{background:#fb641b;color:white;border:none;padding:6px;margin-top:5px;width:100%;}
input,select{width:100%;padding:5px;margin-top:5px;}
#cart{background:white;padding:10px;margin-top:10px;}
.bottom{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:10px;}
</style>

</head>
<body>

<header>
<h3>🌾 Mukshoda Bhandar</h3>
<p>Prop. Khokan Bera & Sons</p>
<p>📍 Negua, Purba Medinipur, West Bengal - 721448</p>
<p>📞 9932186236 / 9883558530</p>
</header>

<div class="container">

<button onclick="login()">🔐 Login</button>

<input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">

<div id="productList"></div>

<h3>🧾 Cart</h3>
<div id="cart"></div>

<button onclick="generateBill()">🧾 Bill</button>
<button onclick="downloadPDF()">📄 PDF</button>
<button onclick="saveDaily()">📊 Save</button>
<button onclick="showReport()">📈 Report</button>

</div>

<div class="bottom">
<button onclick="loadProducts(products)">🏠</button>
<button onclick="showCart()">🛒</button>
<button onclick="checkout()">📲</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let products = [
{company:"Smith",name:"Cameo",price:300,img:"https://via.placeholder.com/150",sizes:["1L","500ml","250ml","100ml"]},
{company:"Hindustan",name:"Hind Star",price:320,img:"https://via.placeholder.com/150",sizes:["1L","500ml","250ml","100ml"]},
{company:"Agro Life",name:"Sultan",price:400,img:"https://via.placeholder.com/150",sizes:["1L","500ml","250ml","100ml"]},
{company:"Mahindra",name:"Celdox",price:380,img:"https://via.placeholder.com/150",sizes:["1L","500ml","250ml","100ml"]},
{company:"Karnataka",name:"Jivras",price:300,img:"https://via.placeholder.com/150",sizes:["1L","500ml","250ml","100ml"]}
];

let cart=[];

function loadProducts(list){
let html='<div class="grid">';
list.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.company}</p>
<p>₹${p.price}</p>
<select id="size_${p.name}">
${p.sizes.map(s=>`<option>${s}</option>`).join("")}
</select>
<input type="number" id="qty_${p.name}" value="1">
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`;
});
html+='</div>';
document.getElementById("productList").innerHTML=html;
}

function addToCart(name,price){
let size=document.getElementById("size_"+name).value;
let qty=parseInt(document.getElementById("qty_"+name).value);
cart.push({name,price,size,qty});
showCart();
}

function showCart(){
let total=0,html="";
cart.forEach((i,ind)=>{
let sub=i.price*i.qty;
total+=sub;
html+=`${i.name} (${i.size}) x ${i.qty} = ₹${sub} <button onclick="removeItem(${ind})">❌</button><br>`;
});
document.getElementById("cart").innerHTML=html+"<hr>Total ₹"+total;
}

function removeItem(i){cart.splice(i,1);showCart();}

function searchProduct(){
let v=document.getElementById("search").value.toLowerCase();
loadProducts(products.filter(p=>p.name.toLowerCase().includes(v)||p.company.toLowerCase().includes(v)));
}

function generateBill(){
let t=0,b="Mukshoda Bhandar\nProp. Khokan Bera & Sons\nNegua, Purba Medinipur\nMob: 9932186236\n\n";
cart.forEach(i=>{let s=i.price*i.qty;t+=s;b+=i.name+" "+i.size+" x"+i.qty+" = ₹"+s+"\n";});
alert(b+"\nTotal ₹"+t);
}

function downloadPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF(),y=10,t=0;

doc.text("Mukshoda Bhandar",10,y); y+=10;
doc.text("Prop. Khokan Bera & Sons",10,y); y+=10;
doc.text("Negua, Purba Medinipur",10,y); y+=10;
doc.text("Mob: 9932186236",10,y); y+=10;

cart.forEach(i=>{
let s=i.price*i.qty;
t+=s;
doc.text(i.name+" "+i.size+" x"+i.qty+" = ₹"+s,10,y);
y+=10;
});

doc.text("Total ₹"+t,10,y+10);
doc.save("bill.pdf");
}

function saveDaily(){
let t=0;cart.forEach(i=>t+=i.price*i.qty);
let d=new Date().toLocaleDateString();
let old=JSON.parse(localStorage.getItem("sales")||"{}");
if(!old[d])old[d]=0;
old[d]+=t;
localStorage.setItem("sales",JSON.stringify(old));
alert("Saved");
}

function showReport(){
let d=JSON.parse(localStorage.getItem("sales")||"{}");
let txt="Report\n";
for(let i in d){txt+=i+" = ₹"+d[i]+"\n";}
alert(txt);
}

function login(){
let u=prompt("User");let p=prompt("Pass");
if(u=="admin"&&p=="1234"){alert("OK");}else{alert("Wrong");}
}

function checkout(){
let msg="Order\nMukshoda Bhandar\nNegua, Purba Medinipur\n";
cart.forEach(i=>msg+=i.name+" "+i.size+" x"+i.qty+"\n");
window.open("https://wa.me/919883558530?text="+encodeURIComponent(msg));
}

loadProducts(products);

</script>

</body>
</html>
